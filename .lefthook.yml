---
output: false

pre-commit:
  parallel: true
  commands:
    shellcheck:
      glob: "*.sh"
      run: shellcheck {staged_files}
    yamllint:
      glob: "*.{yaml,yml}"
      run: yamllint {staged_files}
    secrets-scan:
      glob: "*.{yaml,yml,json,sh,py}"
      run: gitleaks detect --source . --no-git -v 2>/dev/null; true

commit-msg:
  commands:
    conventional:
      run: grep -Eq '^(feat|fix|docs|style|refactor|perf|test|ci|chore|revert|ops)(\(.+\))?!?: .+' {1}
