title: "Q&A"
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Ask a question about this project.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add any context that might help answer your question.
