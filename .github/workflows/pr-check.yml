name: pr-check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint:
    uses: guilhermelinosp/ci-templates/.github/workflows/shellcheck.yml@main

  merge-check:
    uses: guilhermelinosp/ci-templates/.github/workflows/merge-check.yml@main

  gitleaks:
    uses: guilhermelinosp/ci-templates/.github/workflows/gitleaks.yml@main

  labeler:
    uses: guilhermelinosp/ci-templates/.github/workflows/labeler.yml@main
